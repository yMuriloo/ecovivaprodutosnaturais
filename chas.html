    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #f1f3f2;
            color: #1e2d27;
        }
        /* NAV */
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 70px;
            background: rgba(20, 50, 38, 0.98);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        nav h2 {
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 20px;
        }
        
        nav a {
            margin-left: 30px;
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            position: relative;
        }
        
        nav a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #6fbf73;
            bottom: -6px;
            left: 0;
            transition: 0.3s;
        }
        
        nav a:hover {
            color: white;
        }
        
        nav a:hover::after {
            width: 100%;
        }
        /* HERO */
        
        .hero {
            height: 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #183c2e, #2f6f4f);
            color: white;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 42px;
            font-weight: 600;
        }
        /* GRID */
        
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 60px 40px 100px 40px;
            justify-content: center;
        }
        
        .item {
            background: white;
            width: 260px;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e5e5;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
        }
        
        .item:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
        }
        /* IMAGEM */
        
        .img-produto {
            width: 100%;
            height: 140px;
            background: #ddd;
            border-radius: 12px;
            margin-bottom: 15px;
            background-size: cover;
            background-position: center;
        }
        /* NOME */
        
        .nome-produto {
            display: block;
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .preco {
            color: #1e3a2f;
            font-weight: 600;
            font-size: 15px;
        }
        /* FOOTER */
        
        footer {
            background: #143226;
            color: #ccc;
            text-align: center;
            padding: 30px;
            font-size: 13px;
        }
    </style>
</head>
