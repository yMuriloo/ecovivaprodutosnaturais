<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Chás Naturais</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #eef7f0;
            color: #163d2b;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 60px;
            background: #1f5c3f;
            color: white;
        }
        
        .hero {
            padding: 60px;
            text-align: center;
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
            color: white;
        }
        
        .menu {
            max-width: 900px;
            margin: 50px auto;
        }
        
        .item {
            display: flex;
            justify-content: space-between;
            padding: 18px;
            margin-bottom: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .preco {
            color: #2e7d32;
            font-weight: 600;
        }
        
        footer {
            background: #1f5c3f;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h2 onclick="location.href='index.html'" style="cursor:pointer;">🌿 EcoViva</h2>
    </header>

    <section class="hero">
        <h1>Chás Naturais</h1>
        <p>Seleção premium para relaxamento e saúde</p>
    </section>

    <div class="menu">

        <div class="item"><span>Hibisco</span><span class="preco">R$ 13,90</span></div>
        <div class="item"><span>Chá Verde</span><span class="preco">R$ 14,90</span></div>
        <div class="item"><span>Erva-doce</span><span class="preco">R$ 10,90</span></div>
        <div class="item"><span>Capim-limão</span><span class="preco">R$ 12,50</span></div>
        <div class="item"><span>Gengibre</span><span class="preco">R$ 13,50</span></div>
        <div class="item"><span>Jasmim</span><span class="preco">R$ 14,50</span></div>
        <div class="item"><span>Maracujá</span><span class="preco">R$ 12,00</span></div>

    <footer>
        📞 (48) 99999-1234 | 📧 contato@ecoviva.com

</body>

</html>
