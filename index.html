<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>EcoViva Naturais</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #eef7f0;
            color: #163d2b;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #1f5c3f;
            color: white;
        }
        
        nav a {
            margin-left: 25px;
            color: white;
            text-decoration: none;
        }
        
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
            color: white;
            padding-top: 80px;
        }
        /* SEARCH */
        
        .search-container {
            position: relative;
        }
        
        .search-box {
            display: flex;
        }
        
        .search-box input {
            width: 320px;
            padding: 12px;
            border: none;
            border-radius: 25px 0 0 25px;
            outline: none;
        }
        
        .search-box button {
            padding: 12px 20px;
            border: none;
            background: #1f5c3f;
            color: white;
            border-radius: 0 25px 25px 0;
        }
        /* sugestões */
        
        .suggestions {
            position: absolute;
            top: 45px;
            width: 100%;
            background: white;
            color: black;
            border-radius: 10px;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .suggestions div {
            padding: 10px;
            cursor: pointer;
        }
        
        .suggestions div:hover {
            background: #e0f2e9;
        }
        /* mensagem */
        
        .not-found {
            margin-top: 10px;
            color: #ffe0e0;
            display: none;
        }
        
        .hero h1 {
            margin-top: 30px;
            font-size: 48px;
        }
        
        .hero p {
            font-size: 20px;
            margin-top: 10px;
        }
        /* resto */
        
        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 80px 40px;
            flex-wrap: wrap;
        }
        
        .card {
            background: white;
            width: 260px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
        
        footer {
            background: #1f5c3f;
            color: white;
            text-align: center;
            padding: 25px;
        }
    </style>
</head>

<body>

    <nav>
        <h2>🌿 EcoViva</h2>
        <div>
            <a href="chas.html">Chás</a>
            <a href="graos.html">Grãos</a>
            <a href="oleos.html">Óleos</a>
        </div>
    </nav>

    <section class="hero">

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar produtos..." onkeyup="buscar()">
                <button>🔍</button>
            </div>

            <div id="suggestions" class="suggestions"></div>
            <div id="notFound" class="not-found">Produto não encontrado 😕</div>
        </div>

        <h1>Produtos Naturais Premium</h1>
        <p>Qualidade, saúde e bem-estar direto da natureza</p>

    </section>

    <footer>
        📞 (48) 99999-1234
    </footer>

    <script>
        const produtos = [
        "Camomila", "Hortelã", "Hibisco", "Chá Verde", "Erva-doce", "Capim-limão", "Gengibre", "Jasmim", "Maracujá", "Frutas Vermelhas",

        "Aveia", "Quinoa", "Lentilha", "Grão-de-bico", "Chia", "Linhaça", "Arroz Integral", "Feijão Preto", "Cevada", "Amaranto", "Milho", "Soja",

        "Óleo de Coco", "Óleo de Argan", "Óleo de Rícino", "Óleo de Amêndoas", "Óleo de Lavanda", "Óleo de Alecrim", "Óleo de Jojoba", "Óleo de Rosa Mosqueta", "Óleo de Eucalipto", "Óleo de Limão", "Óleo de Hortelã", "Óleo de Baunilha"
        ];];

        // remove acento
        function normalizar(texto) {
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        // pequena tolerância (contém parte da palavra)
        function parecido(a, b) {
            return a.includes(b) || b.includes(a);
        }

        function buscar() {
            let input = document.getElementById("searchInput").value;
            let inputNorm = normalizar(input);

            let sugestoes = document.getElementById("suggestions");
            let notFound = document.getElementById("notFound");

            sugestoes.innerHTML = "";

            if (input === "") {
                sugestoes.style.display = "none";
                notFound.style.display = "none";
                return;
            }

            let resultados = produtos.filter(produto => {
                let p = normalizar(produto);
                return parecido(p, inputNorm);
            });

            if (resultados.length > 0) {
                sugestoes.style.display = "block";
                notFound.style.display = "none";

                resultados.forEach(p => {
                    let div = document.createElement("div");
                    div.innerText = p;
                    sugestoes.appendChild(div);
                });

            } else {
                sugestoes.style.display = "none";
                notFound.style.display = "block";
            }
        }
    </script>

</body>

</html>
